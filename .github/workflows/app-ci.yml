# CI for the KMP app in app/ — scoped by paths so the every-30-min data commits from
# check-models.yml never trigger it. The debug APK from every run is downloadable from the
# run's Artifacts section (kept ~90 days); tagged releases with installers for every desktop
# OS come from app-release.yml instead.
name: App CI

on:
  pull_request:
    paths: ['app/**', '.github/workflows/app-ci.yml']
  push:
    branches: [main]
    paths: ['app/**', '.github/workflows/app-ci.yml']
  workflow_dispatch:

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  android-and-desktop:
    name: Android APK + desktop tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK + run tests
        working-directory: app
        run: ./gradlew :composeApp:assembleDebug :composeApp:desktopTest
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iwoy-debug-apk
          path: app/composeApp/build/outputs/apk/debug/composeApp-debug.apk

  ios:
    name: iOS build (simulator, unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      # Builds the whole thing: the Xcode project's "Compile Kotlin Framework" phase invokes
      # Gradle's embedAndSignAppleFrameworkForXcode, so this exercises the Kotlin/Native iOS
      # targets AND the Swift wrapper. Signing is disabled — an .ipa would need Apple
      # Developer certificates; this verifies the app compiles and links.
      - name: Build iOS app
        run: |
          xcodebuild -project app/iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
