<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Is whatever out yet?</title>
  <meta name="description" content="Tracking things that may or may not be out yet.">

  <!-- theme-color is kept in sync with the active theme by applyTheme() below -->
  <meta name="theme-color" content="#0a0a0a">

  <!-- PWA: installable on Android/iOS home screens, served straight off GitHub Pages -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Out yet?">

  <!-- Social previews -->
  <meta property="og:title" content="Is whatever out yet?">
  <meta property="og:description" content="Tracking things that may or may not be out yet.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://iswhateveroutyet.com">
  <meta property="og:image" content="https://iswhateveroutyet.com/icons/icon-512.png">
  <meta name="twitter:card" content="summary">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0a;
      --surface:     #141414;
      --border:      #222;
      --text:        #e8e8e8;
      --muted:       #6a6a6a;
      --no-answer:   #3a3a3a;
      --yes:         #22c55e;
      --yes-bg:      rgba(34, 197, 94, 0.07);
      --yes-border:  rgba(34, 197, 94, 0.3);
      --soon:        #f59e0b;
      --soon-bg:     rgba(245, 158, 11, 0.07);
      --soon-border: rgba(245, 158, 11, 0.3);
      --other:       #60a5fa;
      /* "death" tone — somber slate instead of celebratory green for "they're out (deceased)" */
      --gone:        #8b95a7;
      --gone-bg:     rgba(139, 149, 167, 0.06);
      --gone-border: rgba(139, 149, 167, 0.28);
    }

    [data-theme="light"] {
      --bg:          #f7f7f8;
      --surface:     #ffffff;
      --border:      #e3e3e6;
      --text:        #1a1a1a;
      --muted:       #8a8a8a;
      --no-answer:   #c4c4c8;
      --yes:         #16a34a;
      --yes-bg:      rgba(22, 163, 74, 0.08);
      --yes-border:  rgba(22, 163, 74, 0.35);
      --soon:        #d97706;
      --soon-bg:     rgba(217, 119, 6, 0.09);
      --soon-border: rgba(217, 119, 6, 0.35);
      --other:       #2563eb;
      --gone:        #5b6472;
      --gone-bg:     rgba(91, 100, 114, 0.07);
      --gone-border: rgba(91, 100, 114, 0.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 1.25rem 5rem;
      gap: 4rem;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    header { text-align: center; }

    h1 {
      font-size: clamp(2.5rem, 7vw, 4.25rem);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.05;
      margin-bottom: 0.6rem;
    }

    .subtitle { color: var(--muted); font-size: 0.9rem; }

    /* ── settings menu ── */
    .settings {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 20;
    }

    .settings-btn {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background-color 0.2s;
    }

    .settings-btn:hover { border-color: #555; }
    .settings-btn svg { width: 1.15rem; height: 1.15rem; display: block; }

    .settings-panel {
      position: absolute;
      top: 3rem;
      right: 0;
      width: 250px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.5rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      display: none;
      flex-direction: column;
      gap: 0.15rem;
    }

    .settings-panel.open { display: flex; }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.65rem 0.7rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .settings-row:hover { background: var(--bg); }

    .settings-row-label { display: flex; flex-direction: column; gap: 0.15rem; }
    .settings-row-sub { font-size: 0.72rem; color: var(--muted); }

    /* toggle switch */
    .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .track {
      position: absolute; inset: 0;
      background: var(--no-answer);
      border-radius: 999px;
      transition: background-color 0.15s;
      cursor: pointer;
    }
    .switch .track::before {
      content: "";
      position: absolute;
      height: 16px; width: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .switch input:checked + .track { background: var(--other); }
    .switch input:checked + .track::before { transform: translateX(16px); }

    /* range slider (hide long-released) */
    .settings-row-col { flex-direction: column; align-items: stretch; gap: 0.6rem; }
    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: var(--no-answer);
      outline: none;
      cursor: pointer;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--other);
      cursor: pointer;
    }
    .slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border: none;
      border-radius: 50%;
      background: var(--other);
      cursor: pointer;
    }

    /* ── search ── */
    .search-wrap {
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: center;
    }

    #search {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.7rem 0.95rem;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: #444; }
    #search::placeholder { color: var(--muted); }

    .no-results {
      font-size: clamp(2.5rem, 7vw, 4.25rem);
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.05;
      text-align: center;
      padding: 3rem 0;
    }

    /* ── content sections ── */
    #content {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .section { display: flex; flex-direction: column; gap: 0.875rem; }

    .cat-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.75rem;
    }

    /* ── cards ── */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* 🔔 subscribe links (per-card, per-category, and the settings "everything" link) */
    .bell {
      color: var(--muted);
      opacity: 0.55;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
      line-height: 0;
    }
    .bell:hover { opacity: 1; color: var(--other); }
    .bell svg { width: 0.95rem; height: 0.95rem; display: block; }
    .card-bell { position: absolute; top: 0.85rem; right: 0.85rem; }
    .cat-label .bell { margin-left: auto; }
    .settings-link { text-decoration: none; color: inherit; }
    .settings-bell { font-size: 0.95rem; opacity: 0.7; }

    .card.yes  { background: var(--yes-bg);  border-color: var(--yes-border); }
    .card.soon { background: var(--soon-bg); border-color: var(--soon-border); }
    .card.gone { background: var(--gone-bg); border-color: var(--gone-border); }

    .card-name {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 1.3rem;
    }

    .card-answer {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
    }

    .card.yes   .card-answer { color: var(--yes); }
    .card.soon  .card-answer { color: var(--soon); }
    .card.no    .card-answer { color: var(--no-answer); }
    .card.other .card-answer { color: var(--other); }
    .card.gone  .card-answer { color: var(--gone); }

    .card-countdown {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin-top: -0.15rem;
    }

    .card-countdown-label {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--other);
      font-variant-numeric: tabular-nums;
    }

    .card-countdown-sub {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .card-detail {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 0.1rem;
    }

    .card-detail a { color: inherit; text-underline-offset: 3px; }

    /* ── skeleton loader ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .skeleton-line {
      border-radius: 4px;
      background: var(--border);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* ── footer ── */
    footer {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    footer a { color: var(--muted); text-underline-offset: 3px; }

    #error { color: #ef4444; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="settings">
    <button class="settings-btn" id="settings-btn" aria-label="Settings" aria-expanded="false" aria-haspopup="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <div class="settings-panel" id="settings-panel" role="menu" aria-label="Settings">
      <label class="settings-row">
        <span class="settings-row-label">
          Light mode
          <span class="settings-row-sub">Switch the color theme</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="toggle-theme" role="menuitemcheckbox">
          <span class="track"></span>
        </span>
      </label>
      <div class="settings-row settings-row-col">
        <span class="settings-row-label">
          Hide long-released
          <span class="settings-row-sub" id="hide-old-value">Off</span>
        </span>
        <input type="range" id="hide-old-slider" class="slider" min="0" max="5" step="1" value="0"
               aria-label="Hide items released longer than">
      </div>
      <a class="settings-row settings-link" href="https://ntfy.sh/iswhateveroutyet-all"
         target="_blank" rel="noopener" role="menuitem">
        <span class="settings-row-label">
          Notify me about everything
          <span class="settings-row-sub">Push when anything flips, via ntfy</span>
        </span>
        <span class="bell settings-bell">↗</span>
      </a>
    </div>
  </div>

  <header>
    <h1>Is whatever out yet?</h1>
  </header>

  <div class="search-wrap">
    <input id="search" type="search" placeholder="Filter by name…" autocomplete="off" />
  </div>

  <div id="content"></div>

  <footer>
    <span id="updated"></span>
    <span><a href="https://github.com/sfryslie/is-whatever-out-yet" target="_blank" rel="noopener">Source</a></span>
  </footer>

  <script>
    const content = document.getElementById('content');
    const searchInput = document.getElementById('search');

    // Allow deep-linking a prepopulated filter via ?search=... — used by the
    // isclaudesonnet5outyet.com redirect to land on the Sonnet 5 card.
    const initialSearch = new URLSearchParams(window.location.search).get('search');
    if (initialSearch) searchInput.value = initialSearch;

    let allItems = [];

    // ntfy push links. The topic scheme mirrors the checker (its NTFY_TOPIC_PREFIX must equal
    // NTFY_PREFIX here): a per-item topic, a per-category firehose, and a global one. ntfy has no
    // wildcard subscribe, so each tier is its own topic. Opening the URL lets you subscribe via the
    // ntfy web app or hand off to the installed app.
    const NTFY_PREFIX = 'iswhateveroutyet';
    const catSlug = c => c.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const ntfyItemUrl = item => `https://ntfy.sh/${NTFY_PREFIX}-${catSlug(item.category)}-${item.id}`;
    const ntfyCatUrl = cat => `https://ntfy.sh/${NTFY_PREFIX}-${catSlug(cat)}-all`;
    const BELL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>';

    // "Hide long-released" slider stops. Each level hides items that have been out longer than
    // `days`; level 0 is off, and the last (-1) hides anything released at all.
    const HIDE_LEVELS = [
      { label: 'Off',                days: Infinity },
      { label: 'Out over 2 years',   days: 730 },
      { label: 'Out over 1.5 years', days: 548 },
      { label: 'Out over 1 year',    days: 365 },
      { label: 'Out over 6 months',  days: 183 },
      { label: 'Anything released',  days: -1 },
    ];

    const DATE_FMT = new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    // Parse "yyyy-MM-dd" as a *local* date so a release on 2026-07-10 reads as
    // midnight wherever the user is — avoids the UTC→local off-by-one at midnight.
    function parseLocalDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function midnightToday() {
      const t = new Date();
      t.setHours(0, 0, 0, 0);
      return t;
    }

    function monthsBetween(from, to) {
      let m = (to.getFullYear() - from.getFullYear()) * 12 + (to.getMonth() - from.getMonth());
      if (to.getDate() < from.getDate()) m--;
      return Math.max(0, m);
    }

    // ── Settings: theme + filters ──────────────────────────────────────────────
    const themeMeta = document.querySelector('meta[name="theme-color"]');

    function applyTheme(theme) {
      const isLight = theme === 'light';
      document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
      themeMeta.setAttribute('content', isLight ? '#f7f7f8' : '#0a0a0a');
      document.getElementById('toggle-theme').checked = isLight;
    }

    // Stored choice wins; otherwise follow the OS preference.
    const storedTheme = localStorage.getItem('theme');
    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    applyTheme(storedTheme || (prefersLight ? 'light' : 'dark'));

    const hideSlider = document.getElementById('hide-old-slider');
    const hideValueLabel = document.getElementById('hide-old-value');
    let hideLevel = Math.min(HIDE_LEVELS.length - 1, Math.max(0, +localStorage.getItem('hideOldLevel') || 0));
    hideSlider.value = hideLevel;
    function updateHideLabel() { hideValueLabel.textContent = HIDE_LEVELS[hideLevel].label; }
    updateHideLabel();

    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');

    function setPanel(open) {
      settingsPanel.classList.toggle('open', open);
      settingsBtn.setAttribute('aria-expanded', String(open));
    }

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      setPanel(!settingsPanel.classList.contains('open'));
    });
    document.addEventListener('click', (e) => {
      if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) setPanel(false);
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') setPanel(false); });

    document.getElementById('toggle-theme').addEventListener('change', (e) => {
      const theme = e.target.checked ? 'light' : 'dark';
      localStorage.setItem('theme', theme);
      applyTheme(theme);
    });

    hideSlider.addEventListener('input', () => {
      hideLevel = +hideSlider.value;
      localStorage.setItem('hideOldLevel', String(hideLevel));
      updateHideLabel();
      if (allItems.length > 0) renderGrid();
    });

    // The date an item became available, or null if it isn't out / we don't know when.
    // `since` is the explicit signal (hardcoded/API "Yes." items); a past `releaseDate`
    // is the implicit one (date-driven items the frontend has already flipped).
    function outDate(item) {
      if (item.since) return parseLocalDate(item.since);
      if (item.releaseDate) {
        const r = parseLocalDate(item.releaseDate);
        if (midnightToday() >= r) return r;
      }
      return null;
    }

    // Hidden when the item has an out-date older than the current slider level's threshold.
    // Level 0 (Off) hides nothing; the last level (days = -1) hides anything released at all.
    function isHiddenByLevel(item) {
      const days = HIDE_LEVELS[hideLevel].days;
      if (days === Infinity) return false;
      const out = outDate(item);
      if (!out) return false;
      return (midnightToday() - out) / 86_400_000 > days;
    }

    // Resolve a date-driven item against the user's local clock: derive answer,
    // detail, and countdown text. `releaseDate` drives the Yes/No flip; `countdownTo`
    // is display-only (server's `answer` stays authoritative). Items with neither
    // pass through untouched.
    function resolveItem(item) {
      if (item.releaseDate) {
        const today = midnightToday();
        const release = parseLocalDate(item.releaseDate);

        if (today >= release) {
          return { ...item, answer: 'Yes.', detail: `Released ${DATE_FMT.format(release)}` };
        }

        const days = Math.round((release - today) / 86_400_000);
        let label, sub;
        if (item.vagueLabel) {
          const months = monthsBetween(today, release);
          label = item.vagueLabel;
          sub = months >= 1
            ? `~${months} month${months === 1 ? '' : 's'} out`
            : `~${days} day${days === 1 ? '' : 's'} out`;
        } else {
          label = DATE_FMT.format(release);
          sub = `${days} day${days === 1 ? '' : 's'} to go`;
        }
        return { ...item, answer: 'No.', countdownLabel: label, countdownSub: sub };
      }

      if (item.countdownTo) {
        const today = midnightToday();
        const target = parseLocalDate(item.countdownTo);
        if (today < target) {
          const days = Math.round((target - today) / 86_400_000);
          return {
            ...item,
            countdownLabel: DATE_FMT.format(target),
            countdownSub: `${days} day${days === 1 ? '' : 's'} to go`,
          };
        }
      }

      return item;
    }

    // Soonest-first sort key within a category: an upcoming release/reveal date in ms,
    // or Infinity for items with no future date (kept in catalogue order by stable sort).
    function upcomingSortKey(item) {
      const today = midnightToday();
      const iso = item.releaseDate || item.countdownTo;
      if (iso) {
        const d = parseLocalDate(iso);
        if (d > today) return d.getTime();
      }
      return Infinity;
    }

    function cardClass(item, answer) {
      if (item.tone === 'death') return 'gone';
      const a = answer.toLowerCase();
      if (a.startsWith('yes'))                           return 'yes';
      if (a.startsWith('no') || a === 'never.')          return 'no';
      if (a.includes('soon') || a.includes('next year')) return 'soon';
      return 'other';
    }

    function renderSkeletons() {
      const grid = document.createElement('div');
      grid.className = 'grid';
      for (let i = 0; i < 8; i++) {
        grid.innerHTML += `
          <div class="skeleton">
            <div class="skeleton-line" style="height:11px;width:50%"></div>
            <div class="skeleton-line" style="height:40px;width:35%"></div>
          </div>`;
      }
      content.appendChild(grid);
    }

    function renderGrid() {
      const filter = searchInput.value.trim().toLowerCase();
      let visibleItems = filter
        ? allItems.filter(item => item.label.toLowerCase().includes(filter))
        : allItems;

      if (hideLevel > 0) visibleItems = visibleItems.filter(item => !isHiddenByLevel(item));

      content.innerHTML = '';

      if (visibleItems.length === 0) {
        content.innerHTML = `<p class="no-results">I don't know.</p>`;
        return;
      }

      // group by category, preserving first-seen order
      const order = [];
      const groups = {};
      visibleItems.forEach(item => {
        if (!groups[item.category]) {
          order.push(item.category);
          groups[item.category] = [];
        }
        groups[item.category].push(item);
      });

      order.forEach(cat => {
        const section = document.createElement('section');
        section.className = 'section';
        section.innerHTML = `<h2 class="cat-label">${cat}
          <a class="bell" href="${ntfyCatUrl(cat)}" target="_blank" rel="noopener"
             title="Notify me about all ${cat}" aria-label="Notify me about all ${cat}">${BELL_SVG}</a>
        </h2>`;

        const grid = document.createElement('div');
        grid.className = 'grid';
        // Stable sort floats imminent releases to the top of each category.
        const sorted = groups[cat]
          .map((raw, i) => ({ raw, i }))
          .sort((a, b) => (upcomingSortKey(a.raw) - upcomingSortKey(b.raw)) || (a.i - b.i))
          .map(x => x.raw);
        sorted.forEach(raw => {
          const item = resolveItem(raw);
          const cls = cardClass(item, item.answer);
          grid.innerHTML += `
            <div class="card ${cls}">
              <a class="bell card-bell" href="${ntfyItemUrl(item)}" target="_blank" rel="noopener"
                 title="Notify me when this changes" aria-label="Notify me about ${item.label}">${BELL_SVG}</a>
              <div class="card-name">${item.label}</div>
              <div class="card-answer">${item.answer}</div>
              ${item.countdownLabel ? `
                <div class="card-countdown">
                  <div class="card-countdown-label">${item.countdownLabel}</div>
                  <div class="card-countdown-sub">${item.countdownSub}</div>
                </div>
              ` : ''}
              ${item.detail ? `<div class="card-detail">${item.detail}</div>` : ''}
            </div>`;
        });

        section.appendChild(grid);
        content.appendChild(section);
      });
    }

    function renderData({ updated, items }) {
      allItems = items;
      renderGrid();

      const d = new Date(updated);
      const epoch = d.getFullYear() === 1970;
      document.getElementById('updated').textContent = epoch
        ? 'Not yet checked — run the GitHub Action to populate live data.'
        : 'Last checked: ' + d.toLocaleString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric',
            hour: '2-digit', minute: '2-digit', timeZoneName: 'short',
          });
    }

    searchInput.addEventListener('input', () => {
      if (allItems.length > 0) renderGrid();
    });

    renderSkeletons();

    fetch('data.json?v=' + Date.now())
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(renderData)
      .catch(() => {
        content.innerHTML = '<p id="error">Could not load data.json — the GitHub Action may not have run yet.</p>';
      });

    // Register the service worker for offline support + installability. Non-fatal if it fails.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
